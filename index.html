<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Steganography Tool</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<h1 class="main-title">Image Steganography Tool</h1>


<div class="wrapper">

<!-- Encode Section -->
<div class="card">

<h2>Encode File</h2>

<label>Cover Image</label>
<input type="file" id="cover">

<label>File to Hide</label>
<input type="file" id="secret">

<label>Passcode</label>
<input type="password" id="pass" placeholder="Enter passcode">

<button onclick="encode()">Encode & Download</button>

<p id="encodeStatus"></p>

</div>


<!-- Decode Section -->
<div class="card">

<h2>Decode File</h2>

<label>Encoded Image</label>
<input type="file" id="encoded">

<label>Passcode</label>
<input type="password" id="decodePass" placeholder="Enter passcode">

<button onclick="decode()">Decode & Extract</button>

<p id="decodeStatus"></p>

</div>

</div>


<!-- Footer -->
<div class="footer">

<h3>Connect with me:</h3>

<div class="social-links">

<a href="https://www.linkedin.com/in/md-nosibul-islam-connect" target="_blank">
LinkedIn
</a>

<a href="https://github.com/mdnosibulislam" target="_blank">
GitHub
</a>

<a href="https://github.com/mdnosibulislam/Images-magic.git" target="_blank">
Project Repo
</a>

</div>

</div>


<script src="js/encode.js"></script>
<script src="js/decode.js"></script>
<script src="js/main.js"></script>

</body>
</html>
